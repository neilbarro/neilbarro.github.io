<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illuceed</title>
    <link href="comingsoon.css" rel="stylesheet" type="text/css" />
    <link
      href="https://fonts.googleapis.com/css?family=Dosis"
      rel="stylesheet"
    />
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png" />
  </head>
  <body>
    <div class="container">
      <div class="video">
        <video id="background-video" autoplay loop muted poster="images/ss.png">
          <source src="images/lala.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="hero">
        <p>Something Awesome is Under Construction!</p>
        <h1>Coming Soon</h1>
        <hr />
        <p id="dlaunch">Launching in T-Minus</p>
        <p id="launch"></p>
      </div>
    </div>
  </body>
  <script>
    var countDownDate = new Date("August 19, 2025 00:00:00").getTime();
    var x = setInterval(function () {
      var now = new Date().getTime();
      var distance = countDownDate - now;

      var days = Math.floor(distance / (1000 * 60 * 60 * 24));
      var hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
      );
      var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("launch").innerHTML =
        days + "days " + hours + "hrs " + minutes + "mins " + seconds + "secs ";

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("launch").innerHTML = "EXPIRED";
      }
    }, 1000);
  </script>
</html>
