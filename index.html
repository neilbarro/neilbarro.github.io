    <div class="loginbox">
      <img src="Login/images/137587391_941086049756384_9214366392732618952_n.jpg" class="avatar" />
      <h1>Login Here</h1>
      <forms>
        <p>Username</p>
        <input type="text" name="" placeholder="Email or Username" />
        <p>Password</p>
        <input type="password" class="pass-key" placeholder="Enter Password"/>
        <!--span id="show">SHOW</span-->
        <div>
        <input type="submit" value="Login"/>
        <a href="page2.html">Forgot your password?</a><br /></div>
        

      </forms>
      <div class="login">
        Or login with
      </div>
      <div class="links">
        <div class="facebook">
           <i id="icons" class="fab fa-facebook-f"></i>
           <span>Facebook</span>
        </div>
        <div class="google">
           <i id="icons" class="fab fa-google"></i>
           <span>Google</span>
        </div>
    </div>
    <div class="signup">
      Don't have account? <a href="#">Signup Now</a>
   </div>
   <script>
    const pass_field = document.querySelector('.pass-key');
    const showBtn = document.querySelector('#show');
    showBtn.addEventListener('click', function(){
     if(pass_field.type = "password") {
       pass_field.type = "text";
       showBtn.textContent = "HIDE";
       showBtn.style.color = "#3498db";
     }
     else {
       pass_field.type = "password";
       showBtn.textContent = "SHOW";
       showBtn.style.color = "#222";
     }
    });
 </script>
